services:
  postgres:
    image: postgres:16-alpine
    container_name: roadsense-cloud-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roadsense
    ports:
      - "5432:5432"
    volumes:
      - roadsense_pg_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: roadsense-cloud-api-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  roadsense_pg_data:
