services:
  - type: web
    name: roadsense-cloud-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend/cloud-api
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "python -m app.workers.inference_worker & uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: API_SECRET
        generateValue: true
      - key: MODEL_PATH
        value: /opt/render/project/src/backend/cloud-api/models/road_sense_model.tflite
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: ENVIRONMENT
        value: production
      - key: ALLOW_DEV_ENDPOINTS
        value: "0"
